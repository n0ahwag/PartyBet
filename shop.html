<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet SHOP</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); }
        .item-card { transition: all 0.2s ease; border: 2px solid transparent; }
        .item-card:active { transform: scale(0.95); }
        .btn-gradient { background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DEINE FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "LIVE_PRO_SESSION";

        const SHOP_ITEMS = [
            { id: 'mushroom', name: 'Turbo-Pilz', price: 30, icon: '🍄', desc: '+3 Felder beim nächsten Wurf' },
            { id: 'banana', name: 'Bananenschale', price: 40, icon: '🍌', desc: 'Stiehl dem Gegner 15 Credits' },
            { id: 'shield', name: 'Schild', price: 50, icon: '🛡️', desc: 'Schutz vor dem nächsten Angriff' }
        ];

        function ShopApp() {
            const [room, setRoom] = useState(null);
            const [myId, setMyId] = useState(null); // {ti, pi}

            useEffect(() => {
                const ref = db.ref(`rooms/${ROOM_ID}`);
                ref.on('value', s => setRoom(s.val()));
                return () => ref.off();
            }, []);

            const buyItem = (item) => {
                const team = room.teams[myId.ti];
                if (team.credits < item.price) return alert("Zu wenig Gems!");
                
                const newCredits = team.credits - item.price;
                const newInventory = team.inventory ? [...team.inventory, item.id] : [item.id];
                
                db.ref(`rooms/${ROOM_ID}/teams/${myId.ti}`).update({
                    credits: newCredits,
                    inventory: newInventory
                });
            };

            const useItem = (itemId, index) => {
                const team = room.teams[myId.ti];
                const newInventory = [...team.inventory];
                newInventory.splice(index, 1);
                
                // Effekt in DB setzen (index.html liest diesen beim Würfeln aus)
                db.ref(`rooms/${ROOM_ID}/teams/${myId.ti}`).update({
                    inventory: newInventory,
                    activeEffect: itemId
                });
                alert(`${itemId} wurde aktiviert!`);
            };

            if (!room) return <div className="p-10 text-center uppercase font-black opacity-20">Lade Shop...</div>;

            if (!myId) return (
                <div className="max-w-md mx-auto p-8 text-center">
                    <h1 className="text-3xl font-black italic uppercase mb-10 text-indigo-600">Shop Login</h1>
                    <p className="text-xs font-bold text-gray-400 mb-6 uppercase">Wähle dein Team zum Shoppen:</p>
                    <div className="space-y-4">
                        {room.teams?.map((t, ti) => (
                            <button key={ti} onClick={() => setMyId({ti, pi:0})} className="w-full bg-white p-6 rounded-[2rem] card-shadow border-l-8 font-black uppercase text-sm italic flex justify-between items-center" style={{borderColor: t.color}}>
                                {t.name}
                                <span className="text-indigo-600">{t.credits} Gems</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            const myTeam = room.teams[myId.ti];

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col border-x border-slate-100 shadow-2xl">
                    <!-- Header -->
                    <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-50">
                        <div>
                            <h1 className="text-2xl font-black italic uppercase leading-none tracking-tighter">Item Shop</h1>
                            <p className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mt-1">{myTeam.name}</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[9px] font-bold text-gray-400 uppercase">Dein Kontostand</p>
                            <p className="text-2xl font-black text-indigo-600">{myTeam.credits} <span className="text-xs">Gems</span></p>
                        </div>
                    </div>

                    <!-- Shop Items -->
                    <div className="p-6 flex-1 space-y-6 overflow-y-auto">
                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest italic mb-4">Verfügbare Items</h2>
                        {SHOP_ITEMS.map(item => (
                            <div key={item.id} className="bg-slate-50 p-5 rounded-[2rem] border-2 border-transparent hover:border-indigo-100 flex items-center gap-4 transition-all">
                                <div className="text-4xl bg-white p-4 rounded-3xl shadow-sm border border-slate-100">{item.icon}</div>
                                <div className="flex-1">
                                    <p className="font-black text-xs uppercase leading-none mb-1">{item.name}</p>
                                    <p className="text-[10px] text-slate-400 leading-tight font-medium italic">{item.desc}</p>
                                    <p className="mt-2 font-black text-indigo-600 text-sm">{item.price} Gems</p>
                                </div>
                                <button 
                                    onClick={() => buyItem(item)}
                                    disabled={myTeam.credits < item.price}
                                    className="btn-gradient text-white px-5 py-2 rounded-2xl font-black text-[10px] uppercase shadow-lg disabled:opacity-20 active:scale-90 transition-all"
                                >
                                    Kaufen
                                </button>
                            </div>
                        ))}

                        <!-- Inventar -->
                        <div className="mt-12">
                            <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest italic mb-6">Dein Inventar</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {myTeam.inventory?.map((itemId, idx) => {
                                    const item = SHOP_ITEMS.find(x => x.id === itemId);
                                    return (
                                        <div key={idx} className="bg-white border-2 border-slate-100 p-4 rounded-3xl text-center shadow-sm relative">
                                            <div className="text-3xl mb-2">{item.icon}</div>
                                            <p className="text-[10px] font-black uppercase mb-3">{item.name}</p>
                                            <button 
                                                onClick={() => useItem(itemId, idx)}
                                                className="w-full bg-slate-900 text-white py-2 rounded-xl text-[9px] font-black uppercase tracking-widest"
                                            >
                                                Benutzen
                                            </button>
                                        </div>
                                    );
                                })}
                                {(!myTeam.inventory || myTeam.inventory.length === 0) && (
                                    <div className="col-span-2 py-10 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest italic">Inventar ist leer</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <!-- Footer Link -->
                    <div className="p-4 border-t text-center">
                        <a href="index.html" className="text-[10px] font-bold text-slate-400 uppercase tracking-widest underline hover:text-indigo-600">Zurück zum Wetten</a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ShopApp />);
    </script>
</body>
</html>
