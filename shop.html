<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet SHOP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Inter'; background: #F8FAFC;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "LIVE_PRO_SESSION";

        function ShopApp() {
            const [room, setRoom] = useState(null);
            const [me, setMe] = useState(localStorage.getItem('pb_name'));

            useEffect(() => {
                db.ref(`rooms/${ROOM_ID}`).on('value', s => setRoom(s.val()));
            }, []);

            if(!room) return null;

            let tIdx = -1;
            room.teams?.forEach((t, i) => t.members?.forEach(m => { if(m.name === me) tIdx = i; }));

            const buy = (price, id) => {
                const team = room.teams[tIdx];
                if(team.credits < price) return alert("Zu wenig Gems!");
                const newInv = team.inventory ? [...team.inventory, id] : [id];
                db.ref(`rooms/${ROOM_ID}/teams/${tIdx}`).update({
                    credits: team.credits - price,
                    inventory: newInv
                });
            };

            const use = (id, invIdx) => {
                const newInv = [...room.teams[tIdx].inventory];
                newInv.splice(invIdx, 1);
                db.ref(`rooms/${ROOM_ID}/teams/${tIdx}`).update({
                    inventory: newInv,
                    activeEffect: id
                });
                alert("Effekt für den nächsten Wurf aktiviert!");
            };

            const myTeam = room.teams[tIdx];

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col">
                    <header className="p-6 bg-slate-900 text-white flex justify-between items-center">
                        <h1 className="text-2xl font-black italic italic uppercase tracking-tighter">Item Shop</h1>
                        <a href="player.html" className="text-xs font-bold uppercase underline">Zurück</a>
                    </header>

                    <div className="p-6 flex-1 space-y-8 overflow-y-auto">
                        <div className="bg-indigo-600 p-6 rounded-3xl text-white shadow-xl">
                            <p className="text-xs font-bold uppercase opacity-70 mb-1">Guthaben</p>
                            <p className="text-4xl font-black">{myTeam.credits} Gems</p>
                        </div>

                        <div className="space-y-4">
                            <h2 className="text-xs font-black uppercase text-slate-400 tracking-[0.2em]">Marktplatz</h2>
                            <div className="bg-slate-50 p-4 rounded-3xl flex items-center gap-4">
                                <div className="text-4xl bg-white p-3 rounded-2xl shadow-sm">🍄</div>
                                <div className="flex-1 font-black uppercase text-xs">Pilz (+3 Felder) <p className="text-indigo-600">30 Gems</p></div>
                                <button onClick={() => buy(30, 'mushroom')} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold uppercase text-[10px]">Kaufen</button>
                            </div>
                        </div>

                        <div className="space-y-4">
                            <h2 className="text-xs font-black uppercase text-slate-400 tracking-[0.2em]">Dein Inventar</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {myTeam.inventory?.map((id, i) => (
                                    <div key={i} className="bg-white border-2 border-slate-100 p-4 rounded-3xl text-center shadow-sm">
                                        <div className="text-3xl mb-2">🍄</div>
                                        <button onClick={() => use(id, i)} className="w-full bg-slate-900 text-white py-2 rounded-xl font-bold text-[10px] uppercase">Einsetzen</button>
                                    </div>
                                ))}
                                {(!myTeam.inventory || myTeam.inventory.length === 0) && <p className="col-span-2 text-center text-slate-300 italic py-10">Dein Rucksack ist leer.</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ShopApp />);
    </script>
</body>
</html>
