<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet: Das Brettspiel-Wettbüro</title>
    
    <!-- Scripts: React, Babel & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { 
            font-family: 'Fredoka', sans-serif; 
            background-color: #7dd3fc; /* Sky 300 */
            margin: 0;
            padding: 0;
        }
        .comic-border { border: 4px solid black; }
        .comic-shadow { shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]; }
        .wobble:hover { transform: scale(1.05) rotate(1deg); }
        .wobble:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- KONFIGURATION ---
        const COLORS = [
            { name: 'Rot', bg: 'bg-red-500', border: 'border-red-700' },
            { name: 'Blau', bg: 'bg-blue-500', border: 'border-blue-700' },
            { name: 'Grün', bg: 'bg-green-500', border: 'border-green-700' },
            { name: 'Gelb', bg: 'bg-yellow-400', border: 'border-yellow-600' },
            { name: 'Lila', bg: 'bg-purple-500', border: 'border-purple-700' },
        ];

        const FIELD_TYPES = ['plus', 'minus', 'event', 'shop', 'normal'];

        function PartyBetApp() {
            // State
            const [view, setView] = useState('setup'); 
            const [players, setPlayers] = useState([]);
            const [teams, setTeams] = useState([]);
            const [gameState, setGameState] = useState('waiting');
            const [activePlayerView, setActivePlayerView] = useState(0);
            const [board, setBoard] = useState([]);
            const [currentTeamTurn, setCurrentTeamTurn] = useState(0);
            const [diceResult, setDiceResult] = useState(null);
            const [isRolling, setIsRolling] = useState(false);

            // Board beim Start generieren
            useEffect(() => {
                const newBoard = Array.from({ length: 40 }, (_, i) => ({
                    id: i,
                    type: i === 0 ? 'start' : i === 39 ? 'finish' : FIELD_TYPES[Math.floor(Math.random() * FIELD_TYPES.length)]
                }));
                setBoard(newBoard);
            }, []);

            // Funktionen
            const addPlayer = () => {
                const input = document.getElementById('playerInput');
                if (input.value.trim()) {
                    setPlayers([...players, { id: Date.now(), name: input.value.trim() }]);
                    input.value = '';
                }
            };

            const startProject = () => {
                if (players.length < 2) return;
                const shuffled = [...players].sort(() => 0.5 - Math.random());
                const newTeams = [];
                for (let i = 0; i < shuffled.length; i += 2) {
                    const members = [shuffled[i]];
                    if (shuffled[i+1]) members.push(shuffled[i+1]);
                    newTeams.push({
                        id: i,
                        name: `Team ${COLORS[newTeams.length % COLORS.length].name}`,
                        color: COLORS[newTeams.length % COLORS.length],
                        members: members,
                        credits: 100,
                        position: 0
                    });
                }
                setTeams(newTeams);
                setGameState('betting');
                setView('tv');
            };

            const rollDice = () => {
                setIsRolling(true);
                setDiceResult(null);
                setTimeout(() => {
                    const result = Math.floor(Math.random() * 6) + 1;
                    setDiceResult(result);
                    setIsRolling(false);
                    
                    // Bewegen
                    setTimeout(() => {
                        setTeams(prev => {
                            const updated = [...prev];
                            let newPos = updated[currentTeamTurn].position + result;
                            if (newPos > 39) newPos = 39;
                            updated[currentTeamTurn].position = newPos;
                            
                            // Feld-Effekte
                            const field = board[newPos];
                            if(field.type === 'plus') updated[currentTeamTurn].credits += 15;
                            if(field.type === 'minus') updated[currentTeamTurn].credits = Math.max(0, updated[currentTeamTurn].credits - 15);
                            
                            return updated;
                        });
                        
                        // Nächster Turn
                        setCurrentTeamTurn((currentTeamTurn + 1) % teams.length);
                    }, 1000);
                }, 1000);
            };

            // --- UI KOMPONENTEN ---
            const Card = ({ children, className = "" }) => (
                <div className={`bg-white border-4 border-black rounded-3xl p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] ${className}`}>
                    {children}
                </div>
            );

            const Button = ({ onClick, children, color = "bg-yellow-400" }) => (
                <button 
                    onClick={onClick}
                    className={`${color} border-4 border-black rounded-2xl px-6 py-3 font-bold uppercase shadow-[4px_4px_0_0_rgba(0,0,0,1)] wobble transition-all mb-2`}
                >
                    {children}
                </button>
            );

            // --- VIEWS ---
            if (view === 'setup') return (
                <div className="max-w-xl mx-auto pt-10 px-4">
                    <h1 className="text-6xl font-black text-center text-white drop-shadow-[6px_6px_0_rgba(0,0,0,1)] italic mb-8">PARTY BET</h1>
                    <Card>
                        <h2 className="text-2xl font-bold mb-4">Spieler hinzufügen:</h2>
                        <div className="flex gap-2 mb-6">
                            <input id="playerInput" type="text" className="flex-1 border-4 border-black rounded-xl p-3 text-xl" placeholder="Name..." onKeyPress={(e) => e.key === 'Enter' && addPlayer()} />
                            <Button onClick={addPlayer}>+</Button>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mb-6">
                            {players.map(p => (
                                <div key={p.id} className="bg-blue-100 border-2 border-black p-3 rounded-xl font-bold flex justify-between">
                                    {p.name}
                                    <span className="cursor-pointer text-red-500" onClick={() => setPlayers(players.filter(x => x.id !== p.id))}>✕</span>
                                </div>
                            ))}
                        </div>
                        {players.length >= 2 && <Button onClick={startProject} color="bg-green-400 w-full text-xl py-5">Teams bilden & Start!</Button>}
                    </Card>
                </div>
            );

            if (view === 'tv') return (
                <div className="p-4">
                    {/* Top Switcher für Demo */}
                    <div className="bg-black text-white p-2 rounded-xl flex gap-4 text-xs mb-4 overflow-x-auto">
                        <span className="font-bold text-yellow-400">VIEW SWITCHER:</span>
                        <button onClick={() => setView('tv')} className="underline">TV-Ansicht</button>
                        {players.map((p, i) => (
                            <button key={i} onClick={() => {setView('player'); setActivePlayerView(i);}} className="opacity-70">Handy: {p.name}</button>
                        ))}
                        <button onClick={() => setView('setup')} className="ml-auto text-red-400 text-[8px]">Spiel Reset</button>
                    </div>

                    <div className="grid grid-cols-12 gap-6">
                        {/* Sidebar */}
                        <div className="col-span-3 space-y-4">
                            <Card>
                                <h3 className="font-black text-xl mb-4 italic">🏆 STANDING</h3>
                                {teams.map((t, i) => (
                                    <div key={i} className={`p-3 border-4 border-black rounded-xl mb-3 ${t.color.bg} text-white flex justify-between items-center`}>
                                        <span className="font-bold">{t.name}</span>
                                        <span className="bg-black/20 px-2 rounded-lg text-sm">💰 {t.credits}</span>
                                    </div>
                                ))}
                            </Card>

                            <Card className="bg-sky-100 text-center">
                                <h3 className="font-black mb-2 uppercase">Würfel-Phase</h3>
                                <div className={`w-24 h-24 bg-white border-4 border-black mx-auto my-4 rounded-3xl flex items-center justify-center text-5xl font-black shadow-lg ${isRolling ? 'animate-bounce' : ''}`}>
                                    {isRolling ? '?' : (diceResult || '🎲')}
                                </div>
                                <p className="font-bold mb-4">{teams[currentTeamTurn]?.name} ist am Zug!</p>
                                {!isRolling && <Button onClick={rollDice} color="bg-white w-full text-black">WÜRFELN!</Button>}
                            </Card>
                        </div>

                        {/* Spielfeld */}
                        <div className="col-span-9 bg-white border-4 border-black rounded-[3rem] p-8 grid grid-cols-8 gap-2 relative shadow-[15px_15px_0_0_rgba(0,0,0,0.1)]">
                            {board.map((f, i) => (
                                <div key={i} className={`h-24 border-4 border-black rounded-2xl flex items-center justify-center relative font-bold
                                    ${f.type === 'plus' ? 'bg-green-400' : f.type === 'minus' ? 'bg-red-400' : f.type === 'event' ? 'bg-yellow-400' : f.type === 'shop' ? 'bg-purple-400' : f.type === 'start' ? 'bg-gray-200' : f.type === 'finish' ? 'bg-black text-white' : 'bg-blue-100'}
                                `}>
                                    <span className="absolute top-1 left-2 text-[10px] opacity-30">{i}</span>
                                    {f.type === 'shop' && '🛒'}
                                    {f.type === 'event' && '⭐'}
                                    
                                    {/* Team-Figuren */}
                                    <div className="flex flex-wrap gap-1 justify-center">
                                        {teams.filter(t => t.position === i).map(t => (
                                            <div key={t.id} className={`w-6 h-6 rounded-full border-2 border-black ${t.color.bg} shadow-md animate-bounce`}></div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (view === 'player') {
                const p = players[activePlayerView];
                const team = teams.find(t => t.members.some(m => m.id === p.id));
                return (
                    <div className="p-6 max-w-md mx-auto">
                        <Button onClick={() => setView('tv')} color="bg-black text-white text-xs px-2 py-1 mb-4">← Zurück zum TV</Button>
                        <Card className={`${team?.color.bg} text-white mb-6`}>
                            <p className="uppercase text-[10px] font-bold opacity-80">Dein Handy-Interface</p>
                            <h2 className="text-4xl font-black italic">{p.name}</h2>
                            <p className="text-xl font-bold mt-2">Team-Konto: {team?.credits} CR</p>
                        </Card>

                        <Card className="space-y-4 text-center">
                            <h3 className="font-black text-2xl uppercase italic">Geheime Wette</h3>
                            <p className="text-sm text-gray-600 font-bold">Auf welchen Platz landet dein Teampartner?</p>
                            <div className="grid grid-cols-4 gap-2">
                                {[1, 2, 3, 4].map(n => (
                                    <button key={n} className="border-4 border-black p-3 rounded-xl font-black text-xl hover:bg-yellow-400 focus:bg-yellow-400 transition-colors">
                                        {n}.
                                    </button>
                                ))}
                            </div>
                            <div className="pt-4">
                                <p className="text-left text-xs font-bold mb-1">Einsatz:</p>
                                <input type="range" className="w-full accent-black" min="10" max="100" />
                            </div>
                            <Button color="bg-green-500 text-white w-full py-4 mt-4">Wette abgeben!</Button>
                        </Card>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PartyBetApp />);
    </script>
</body>
</html>
