<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet Pro LIVE</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; background-image: radial-gradient(#E2E8F0 1.5px, transparent 1.5px); background-size: 30px 30px; }
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); }
        
        /* Professionelles Spielfeld */
        .board-wrapper { position: relative; width: 100%; height: 480px; background: #f0f9ff; border-radius: 3rem; border: 4px solid #bae6fd; overflow: hidden; box-shadow: inset 0 0 100px rgba(186, 230, 253, 0.3); }
        .board-path-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.2; }
        .field-node { position: absolute; width: 32px; height: 32px; border-radius: 50%; border: 3px solid white; transform: translate(-50%, -50%); background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #94A3B8; }
        .team-token { width: 26px; height: 26px; border-radius: 50%; border: 2px solid white; position: absolute; z-index: 20; transform: translate(-50%, -50%); transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .dice-box { width: 80px; height: 80px; background: white; border: 4px solid black; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; box-shadow: 0 8px 0 #CBD5E1; }
        .rolling { animation: roll 0.1s infinite; }
        @keyframes roll { 0% { transform: rotate(0); } 50% { transform: rotate(5deg) scale(1.1); } 100% { transform: rotate(-5deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "LIVE_PRO_SESSION";

        const TEAM_COLORS = ['#6366F1', '#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#EC4899'];
        const GAMES = [
            { name: "Bierdeckel-Flip", rules: "Wer flippt am meisten Deckel von der Tischkante?" },
            { name: "Socken-Weitwurf", rules: "Zielsicher Socken in einen Korb werfen." },
            { name: "Karten-Haus", rules: "Baut in 60 Sek. das höchste Haus." },
            { name: "Löffel-Parcours", rules: "Balanciere einen Ball auf einem Löffel durchs Ziel." }
        ];
        const SHOP_ITEMS = [
            { id: 'mushroom', name: 'Pilz', price: 30, icon: '🍄', desc: '+3 Felder beim nächsten Wurf' },
            { id: 'banana', name: 'Banane', price: 40, icon: '🍌', desc: 'Gegner verliert 20 Credits' }
        ];

        // Festgelegter Pfad für 30 Felder (X und Y in Prozent)
        const BOARD_COORDS = [
            {x:10, y:50}, {x:12, y:35}, {x:18, y:22}, {x:28, y:15}, {x:40, y:12}, {x:52, y:15}, {x:62, y:22}, {x:70, y:35}, {x:72, y:50}, {x:70, y:65}, 
            {x:62, y:78}, {x:52, y:85}, {x:40, y:88}, {x:28, y:85}, {x:18, y:78}, {x:12, y:65}, {x:5, y:50}, {x:8, y:30}, {x:18, y:10}, {x:35, y:5}, 
            {x:55, y:5}, {x:75, y:10}, {x:88, y:25}, {x:95, y:50}, {x:92, y:75}, {x:80, y:90}, {x:60, y:95}, {x:40, y:95}, {x:20, y:90}, {x:10, y:75}
        ];

        function PartyBetApp() {
            const [mode, setMode] = useState('gate'); // gate, tv, player
            const [room, setRoom] = useState(null);
            const [myId, setMyId] = useState(null); // {tIdx, pIdx}
            const [activeTab, setActiveTab] = useState('bet'); // bet, shop
            const [isSpinning, setIsSpinning] = useState(false);

            useEffect(() => {
                const ref = db.ref(`rooms/${ROOM_ID}`);
                ref.on('value', s => setRoom(s.val()));
                return () => ref.off();
            }, []);

            const update = (path, val) => db.ref(`rooms/${ROOM_ID}/${path}`).set(val);

            // --- TV AKTIONEN ---
            const initGame = () => {
                db.ref(`rooms/${ROOM_ID}`).set({
                    phase: 'setup', round: 1, teams: [], bets: {}, results: {}, dice: 1, game: null
                });
                setMode('tv');
            };

            const runRoulette = () => {
                setIsSpinning(true);
                let count = 0;
                const interval = setInterval(() => {
                    const rnd = GAMES[Math.floor(Math.random() * GAMES.length)];
                    update('game', rnd);
                    count++;
                    if (count > 15) { clearInterval(interval); setIsSpinning(false); }
                }, 120);
            };

            const rollDice = (tIdx) => {
                const t = room.teams[tIdx];
                const roll = Math.floor(Math.random() * 6) + 1;
                let bonus = 0;
                if (t.activeEffect === 'mushroom') {
                    bonus = 3;
                    update(`teams/${tIdx}/activeEffect`, null); // Effekt verbraucht
                }
                const total = roll + bonus;
                update('dice', total);
                update(`teams/${tIdx}/position`, Math.min(29, t.position + total));
            };

            const evaluateResults = () => {
                const teams = [...room.teams];
                const updated = teams.map((t, i) => {
                    const bet = room.bets?.[`team_${i}`];
                    const athlete = (room.round % 2 === 0) ? t.members[1] : t.members[0];
                    const rank = room.results?.[athlete.name];
                    if (bet && rank && parseInt(bet.rank) === parseInt(rank)) {
                        return { ...t, credits: t.credits + (bet.amount * room.teams.length) };
                    }
                    return bet ? { ...t, credits: Math.max(0, t.credits - bet.amount) } : t;
                });
                update('teams', updated);
                update('phase', 'movement');
            };

            // --- VIEWS ---

            if (mode === 'gate') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-white">
                    <h1 className="text-5xl font-black italic text-indigo-600 mb-12 uppercase tracking-tighter">PartyBet Pro</h1>
                    <div className="grid gap-4 w-full max-w-xs">
                        <button onClick={initGame} className="bg-indigo-600 text-white p-8 rounded-[2.5rem] font-black uppercase italic shadow-2xl transition-all active:scale-95">📺 Fernseher</button>
                        <button onClick={() => setMode('player')} className="bg-white border-4 border-slate-50 p-8 rounded-[2.5rem] font-black uppercase italic shadow-xl">📱 Handy</button>
                    </div>
                </div>
            );

            // --- TV ANSICHT ---
            if (mode === 'tv') return (
                <div className="p-8 max-w-[1400px] mx-auto min-h-screen flex flex-col">
                    <div className="flex justify-between items-start mb-8">
                        <div><p className="text-indigo-600 font-bold uppercase text-[10px] tracking-widest italic">Runde {room?.round || 1}</p><h1 className="text-4xl font-black uppercase italic tracking-tighter">Live Arena</h1></div>
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                            {room?.teams?.map((t, i) => (
                                <div key={i} className="bg-white px-5 py-3 rounded-2xl shadow-sm border-t-4" style={{borderColor: t.color}}><p className="text-[9px] font-bold text-slate-400 uppercase leading-none">{t.name}</p><p className="text-xl font-black">{t.credits}</p></div>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 bg-white rounded-[3rem] shadow-2xl p-8 flex flex-col items-center justify-center relative border border-white">
                        {room?.phase === 'setup' && (
                            <div className="max-w-md w-full text-center">
                                <h2 className="text-3xl font-black mb-8 uppercase italic">Team Setup</h2>
                                <input id="tn" placeholder="Team Name" className="w-full bg-slate-50 p-4 rounded-2xl mb-2 font-bold outline-none" />
                                <div className="flex gap-2 mb-6"><input id="p1" placeholder="Spieler A" className="flex-1 bg-slate-50 p-4 rounded-xl" /><input id="p2" placeholder="Spieler B" className="flex-1 bg-slate-50 p-4 rounded-xl" /></div>
                                <button onClick={() => {
                                    const ts = room.teams || [];
                                    const nt = {name: document.getElementById('tn').value, members:[{name:document.getElementById('p1').value},{name:document.getElementById('p2').value}], credits:100, position:0, color: TEAM_COLORS[ts.length % TEAM_COLORS.length], inventory:[], activeEffect: null};
                                    update(`teams/${ts.length}`, nt);
                                    document.getElementById('tn').value='';document.getElementById('p1').value='';document.getElementById('p2').value='';
                                }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs mb-8">Hinzufügen +</button>
                                <button disabled={!room?.teams || room.teams.length < 2} onClick={() => update('phase', 'selection')} className="w-full bg-indigo-600 text-white py-5 rounded-full font-black uppercase italic shadow-xl">Start ➔</button>
                            </div>
                        )}

                        {room?.phase === 'selection' && (
                            <div className="text-center">
                                <h2 className="text-5xl font-black mb-8 uppercase italic">Minispiel Auswahl</h2>
                                <div className="h-32 flex items-center justify-center">
                                    {room.game && (
                                        <div className="bg-indigo-50 p-8 rounded-[2.5rem] border-4 border-indigo-200">
                                            <p className="text-4xl font-black text-indigo-600 uppercase italic leading-none">{room.game.name}</p>
                                            <p className="text-sm font-bold text-indigo-400 mt-2">{room.game.rules}</p>
                                        </div>
                                    )}
                                </div>
                                {!isSpinning && <button onClick={runRoulette} className="bg-indigo-600 text-white px-12 py-5 rounded-full font-black uppercase mt-12 shadow-2xl">Roulette 🎲</button>}
                                {room.game && !isSpinning && <button onClick={() => update('phase', 'betting')} className="block mt-8 mx-auto text-xs font-bold text-gray-400 uppercase tracking-widest italic hover:text-indigo-600 transition-all">Wettphase öffnen ➔</button>}
                            </div>
                        )}

                        {room?.phase === 'betting' && (
                            <div className="text-center w-full max-w-4xl px-10">
                                <h2 className="text-3xl font-black uppercase italic mb-12">Handys wetten...</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {room.teams.map((t, i) => (
                                        <div key={i} className={`p-10 rounded-[3rem] border-4 transition-all ${room.bets?.[`team_${i}`] ? 'border-emerald-400 bg-emerald-50 scale-105' : 'border-slate-50 bg-slate-50 opacity-40'}`}>
                                            <p className="font-black text-xs uppercase mb-2" style={{color: t.color}}>{t.name}</p>
                                            <p className="text-6xl">{room.bets?.[`team_${i}`] ? '✅' : '⏳'}</p>
                                        </div>
                                    ))}
                                </div>
                                <button disabled={Object.keys(room.bets || {}).length < room.teams.length} onClick={() => update('phase', 'input')} className="mt-14 bg-indigo-600 text-white px-14 py-5 rounded-full font-black uppercase shadow-xl">Ergebnisse ➔</button>
                            </div>
                        )}

                        {room?.phase === 'input' && (
                            <div className="w-full max-w-lg text-center">
                                <h2 className="text-3xl font-black mb-8 uppercase italic text-center">Plätze vergeben</h2>
                                {room.teams.map((_, i) => (
                                    <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl mb-3">
                                        <span className="font-black text-indigo-600 text-sm italic tracking-widest">#{i+1} Platz</span>
                                        <select onChange={e => update(`results/${e.target.value}`, i+1)} className="bg-white border rounded-xl p-2 font-bold text-xs outline-none shadow-sm">
                                            <option value="">Wähle Athlet...</option>
                                            {room.teams.map(t => {
                                                const a = (room.round % 2 === 0) ? t.members[1] : t.members[0];
                                                return <option key={a.name} value={a.name}>{a.name} ({t.name})</option>;
                                            })}
                                        </select>
                                    </div>
                                ))}
                                <button onClick={() => update('phase', 'reveal')} className="w-full bg-indigo-600 text-white py-5 rounded-full font-black mt-8 shadow-xl uppercase italic">Check ➔</button>
                            </div>
                        )}

                        {room?.phase === 'reveal' && (
                            <div className="text-center"><h2 className="text-5xl font-black italic uppercase mb-12">Auswertung läuft...</h2><button onClick={evaluateResults} className="bg-slate-900 text-white px-12 py-5 rounded-full font-black shadow-xl uppercase">Zum Board ➔</button></div>
                        )}

                        {room?.phase === 'movement' && (
                            <div className="w-full h-full p-4 flex flex-col">
                                <div className="board-wrapper flex-1 mb-8">
                                    {/* SVG Pfad-Linie */}
                                    <svg className="board-path-svg"><polyline points={BOARD_COORDS.map(c => `${(c.x/100)*800},${(c.y/100)*480}`).join(' ')} fill="none" stroke="#60a5fa" strokeWidth="4" /></svg>
                                    {/* Felder */}
                                    {BOARD_COORDS.map((p, i) => (
                                        <div key={i} className="field-node" style={{left: `${p.x}%`, top: `${p.y}%`}}>
                                            {i === 0 ? 'S' : i === 29 ? 'Z' : i+1}
                                        </div>
                                    ))}
                                    {/* Team Token */}
                                    {room.teams.map((t, i) => (
                                        <div key={i} className="team-token" style={{left: `${BOARD_COORDS[t.position].x}%`, top: `${BOARD_COORDS[t.position].y}%`, backgroundColor: t.color}}>
                                            {t.activeEffect === 'mushroom' && <span className="absolute -top-4 -right-4 text-xs">🍄</span>}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center bg-slate-50 p-8 rounded-[2.5rem] border border-white">
                                    <div className="flex gap-2 flex-wrap max-w-lg">
                                        {room.teams.map((t, i) => (
                                            <button key={i} onClick={() => rollDice(i)} className="text-white text-[10px] font-black rounded-full px-5 py-2 uppercase shadow-lg active:scale-90 transition-all" style={{backgroundColor: t.color}}>
                                                {t.name} Wurf
                                            </button>
                                        ))}
                                    </div>
                                    <div className="dice-box">{room.dice}</div>
                                    <button onClick={() => {
                                        update('phase', 'selection'); update('round', room.round + 1); update('game', null); update('bets', {}); update('results', {});
                                    }} className="bg-slate-900 text-white px-10 py-4 rounded-full font-black text-xs uppercase italic shadow-lg">Nächste Runde ➔</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            // --- PLAYER ANSICHT ---
            if (mode === 'player') return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col relative border-x border-slate-100">
                    {!myId ? (
                        <div className="p-8"><h2 className="text-2xl font-black uppercase italic mb-8">Wähle dein Team</h2>
                        <div className="space-y-4">{room?.teams?.map((t, ti) => (
                            <div key={ti} className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                                <p className="font-bold text-xs text-gray-400 uppercase mb-4" style={{color: t.color}}>{t.name}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => {setMyId({ti, pi:0});}} className="flex-1 bg-white p-3 rounded-xl border font-bold text-xs uppercase hover:bg-indigo-600 hover:text-white transition-all">{t.members[0].name}</button>
                                    <button onClick={() => {setMyId({ti, pi:1});}} className="flex-1 bg-white p-3 rounded-xl border font-bold text-xs uppercase hover:bg-indigo-600 hover:text-white transition-all">{t.members[1].name}</button>
                                </div>
                            </div>
                        ))}</div></div>
                    ) : (
                        <div className="flex-1 flex flex-col h-full overflow-hidden">
                            {/* Player Header */}
                            <div className="p-6 flex justify-between items-center border-b">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full text-white flex items-center justify-center font-black text-xs border-2 border-white shadow-md" style={{backgroundColor: room.teams[myId.ti].color}}>{room.teams[myId.ti].members[myId.pi].name[0]}</div>
                                    <div><p className="font-black text-sm">{room.teams[myId.ti].members[myId.pi].name}</p><p className="text-[9px] font-bold text-blue-500 uppercase">{room.teams[myId.ti].name}</p></div>
                                </div>
                                <div className="text-right font-black text-lg text-indigo-600">{room.teams[myId.ti].credits} <span className="text-[8px] text-slate-300 block uppercase leading-none">Gems</span></div>
                            </div>

                            {/* Main Content Area */}
                            <div className="flex-1 overflow-y-auto p-6 pb-32">
                                {activeTab === 'bet' ? (
                                    /* Wett-Bereich */
                                    <div className="space-y-6">
                                        {room.phase === 'betting' && (myId.pi === (room.round % 2 === 0 ? 0 : 1)) ? (
                                            <div><h3 className="font-black italic uppercase text-lg mb-6">Deine Wette</h3>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {room.teams.map((_, i) => (
                                                        <button key={i} onClick={() => update(`bets/team_${myId.ti}`, {rank: i+1, amount: 20, ready: true})} className={`p-6 rounded-[2rem] font-black text-3xl shadow-sm border-4 transition-all ${room.bets?.[`team_${myId.ti}`]?.rank === i+1 ? 'border-indigo-600 bg-indigo-600 text-white' : 'border-slate-50 bg-white'}`}>#{i+1}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center py-20 opacity-20 italic font-black uppercase text-2xl">Warte auf Action...</div>
                                        )}
                                    </div>
                                ) : (
                                    /* Shop-Bereich */
                                    <div className="space-y-6 animate-in fade-in duration-300">
                                        <h3 className="font-black italic uppercase text-lg">Gems ausgeben</h3>
                                        {SHOP_ITEMS.map(item => (
                                            <button key={item.id} disabled={room.teams[myId.ti].credits < item.price} onClick={() => {
                                                const t = room.teams[myId.ti];
                                                const inv = t.inventory || [];
                                                update(`teams/${myId.ti}/credits`, t.credits - item.price);
                                                update(`teams/${myId.ti}/inventory/${inv.length}`, item.id);
                                            }} className="w-full flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border-2 border-transparent hover:border-indigo-500 disabled:opacity-20 active:scale-95 transition-all text-left">
                                                <div className="text-3xl bg-white p-3 rounded-2xl shadow-sm">{item.icon}</div>
                                                <div className="flex-1"><p className="font-black text-[10px] uppercase">{item.name}</p><p className="text-[8px] text-slate-400 font-bold">{item.desc}</p></div>
                                                <p className="font-black text-indigo-600 text-sm">{item.price}</p>
                                            </button>
                                        ))}

                                        <div className="mt-10 border-t pt-6">
                                            <h4 className="font-black italic uppercase text-sm mb-4">Dein Inventar</h4>
                                            <div className="grid grid-cols-2 gap-2">
                                                {room.teams[myId.ti].inventory?.map((id, i) => {
                                                    const item = SHOP_ITEMS.find(x => x.id === id);
                                                    return (
                                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl border text-center relative group">
                                                            <div className="text-2xl mb-1">{item.icon}</div>
                                                            <p className="text-[9px] font-bold uppercase mb-2">{item.name}</p>
                                                            <button onClick={() => {
                                                                const t = room.teams[myId.ti];
                                                                const newInv = [...t.inventory];
                                                                newInv.splice(i, 1); // Item entfernen
                                                                update(`teams/${myId.ti}/inventory`, newInv);
                                                                update(`teams/${myId.ti}/activeEffect`, item.id); // Effekt aktivieren
                                                            }} className="w-full bg-slate-900 text-white text-[8px] font-bold py-1 rounded-full uppercase">Benutzen</button>
                                                        </div>
                                                    );
                                                })}
                                                {(!room.teams[myId.ti].inventory || room.teams[myId.ti].inventory.length === 0) && <p className="text-[10px] text-slate-300 font-bold uppercase col-span-2 text-center py-4 italic">Keine Items</p>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Player Tab-Switcher (unten fixiert) */}
                            <div className="absolute bottom-0 left-0 w-full bg-white border-t p-4 flex gap-4 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                                <button onClick={() => setActiveTab('bet')} className={`flex-1 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${activeTab === 'bet' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>Wetten</button>
                                <button onClick={() => setActiveTab('shop')} className={`flex-1 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${activeTab === 'shop' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>Shop</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PartyBetApp />);
    </script>
</body>
</html>
