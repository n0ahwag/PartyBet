<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet - Handy</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Inter'; background: #F8FAFC;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "LIVE_PRO_SESSION";

        function PlayerApp() {
            const [room, setRoom] = useState(null);
            const [name, setName] = useState(localStorage.getItem('pb_name') || "");
            const [joined, setJoined] = useState(!!localStorage.getItem('pb_name'));

            useEffect(() => {
                db.ref(`rooms/${ROOM_ID}`).on('value', s => setRoom(s.val()));
            }, []);

            const join = () => {
                if(!name) return;
                localStorage.setItem('pb_name', name);
                db.ref(`rooms/${ROOM_ID}/waitingRoom/${name}`).set(true);
                setJoined(true);
            };

            if (!room) return <div className="p-20 text-center font-black">LADE ARENA...</div>;

            if (!joined) return (
                <div className="max-w-md mx-auto p-10 pt-20 text-center">
                    <h1 className="text-4xl font-black italic text-indigo-600 mb-10">PARTYBET</h1>
                    <input value={name} onChange={e => setName(e.target.value)} placeholder="Dein Name" className="w-full bg-white border-4 border-slate-100 p-6 rounded-3xl mb-4 font-bold text-xl outline-none" />
                    <button onClick={join} className="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase shadow-xl">Join Waiting Room</button>
                </div>
            );

            // Team Suche
            let tIdx = -1; let mIdx = -1;
            room.teams?.forEach((t, i) => t.members?.forEach((m, j) => { if(m.name === name) { tIdx = i; mIdx = j; } }));

            if (tIdx === -1) return (
                <div className="max-w-md mx-auto p-10 pt-40 text-center">
                    <div className="text-6xl animate-bounce mb-8">🚀</div>
                    <p className="font-black uppercase italic text-slate-400">Team-Check läuft...</p>
                    <p className="text-indigo-600 font-bold mt-4 italic">{name}, schau auf den Fernseher!</p>
                </div>
            );

            const myTeam = room.teams[tIdx];

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col border-x border-slate-100">
                    <header className="p-6 border-b flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full text-white flex items-center justify-center font-black text-xl border-4 border-white shadow-lg" style={{backgroundColor: myTeam.color}}>{name[0]}</div>
                            <div><p className="font-black text-lg">{name}</p><p className="text-[10px] font-bold text-indigo-500 uppercase italic">{myTeam.name}</p></div>
                        </div>
                        <div className="text-right font-black text-indigo-600 text-xl">{myTeam.credits} <span className="text-[8px] block uppercase text-slate-300">Gems</span></div>
                    </header>

                    <main className="flex-1 p-8 text-center flex flex-col justify-center">
                        {room.phase === 'movement' && <div className="italic font-black text-slate-200 text-5xl uppercase">Arena<br/>Action!</div>}
                        {room.phase === 'selection' && <div className="italic font-black text-indigo-600 text-3xl uppercase animate-pulse">Neues Spiel<br/>wird gewählt...</div>}
                    </main>

                    <footer className="p-6 border-t flex gap-4 bg-slate-50">
                        <button className="flex-1 bg-white p-4 rounded-2xl font-black text-[10px] uppercase border shadow-sm">Home</button>
                        <a href="shop.html" className="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase text-center shadow-lg active:scale-95 transition-all">Shop & Inventar ➔</a>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PlayerApp />);
    </script>
</body>
</html>
