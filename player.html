<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet Handy</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const RID = "PARTY_STABLE_V4";

        function Player() {
            const [room, setRoom] = useState(null);
            const [name, setName] = useState(localStorage.getItem('pb_name') || "");
            const [joined, setJoined] = useState(false);

            useEffect(() => {
                db.ref(`rooms/${RID}`).on('value', s => setRoom(s.val()));
            }, []);

            if(!room) return <div class="p-20 text-center font-black opacity-20 uppercase">Warte auf TV...</div>;

            if(!joined) return (
                <div class="p-8 pt-20 text-center max-w-md mx-auto">
                    <h1 class="text-3xl font-black italic text-indigo-600 mb-10">DEIN NAME</h1>
                    <input value={name} onChange={e => setName(e.target.value)} placeholder="Name..." class="w-full bg-slate-50 border-4 border-slate-100 p-5 rounded-3xl mb-4 font-bold text-xl outline-none focus:border-indigo-600" />
                    <button onClick={() => { if(!name) return; localStorage.setItem('pb_name', name); db.ref(`rooms/${RID}/waitingRoom/${name}`).set(true); setJoined(true); }} class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase shadow-xl">Join Waiting Room</button>
                </div>
            );

            let myTIdx = -1;
            room.teams?.forEach((t,i) => t.members?.forEach(m => { if(m.name === name) myTIdx = i; }));

            if (myTIdx === -1) return <div class="p-10 pt-40 text-center italic font-black uppercase text-slate-300">Warte auf Zuweisung am TV...</div>;

            return (
                <div class="min-h-screen flex flex-col p-6 max-w-md mx-auto">
                    <header class="flex justify-between items-center mb-10">
                        <div><p class="font-black text-2xl uppercase italic">{name}</p><p class="text-[10px] font-bold text-indigo-500 uppercase">{room.teams[myTIdx].name}</p></div>
                        <p class="text-2xl font-black text-indigo-600">{room.teams[myTIdx].credits} Gems</p>
                    </header>
                    <div class="flex-1 flex flex-col items-center justify-center opacity-10 italic font-black text-4xl uppercase text-center">Action am<br/>Fernseher</div>
                    <footer class="mt-auto flex gap-4">
                        <button class="flex-1 bg-slate-100 p-4 rounded-2xl font-black text-[10px] uppercase">Wetten</button>
                        <a href="shop.html" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase text-center shadow-lg">Shop öffnen</a>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Player />);
    </script>
</body>
</html>
