<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handy - PartyBet</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Inter'; background: #F8FAFC;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "PARTY_SYNC_FINAL"; // EINHEITLICHE ID

        function App() {
            const [room, setRoom] = useState(null);
            const [name, setName] = useState(localStorage.getItem('pb_name') || "");
            const [joined, setJoined] = useState(false);

            useEffect(() => {
                db.ref(`rooms/${ROOM_ID}`).on('value', s => setRoom(s.val()));
            }, []);

            const joinAction = () => {
                if(!name.trim()) return alert("Name fehlt!");
                localStorage.setItem('pb_name', name);
                // WICHTIG: Hier wird der Name in den Warteraum geschrieben
                db.ref(`rooms/${ROOM_ID}/waitingRoom/${name.trim()}`).set(true);
                setJoined(true);
            };

            if (!room) return <div className="p-20 text-center font-black opacity-20 uppercase">Verbinde...</div>;

            if (!joined) return (
                <div class="max-w-md mx-auto p-10 pt-20 text-center">
                    <h1 class="text-4xl font-black italic text-indigo-600 mb-10">DEIN NAME</h1>
                    <input value={name} onChange={e => setName(e.target.value)} placeholder="z.B. Lukas" class="w-full bg-white border-4 border-slate-100 p-6 rounded-3xl mb-4 font-bold text-xl outline-none focus:border-indigo-600" />
                    <button onClick={joinAction} class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase shadow-xl">Warteraum beitreten</button>
                </div>
            );

            // Prüfen ob bereits in einem Team
            let myTeamIdx = -1;
            room.teams?.forEach((t, i) => t.members?.forEach(m => { if(m.name === name) myTeamIdx = i; }));

            if (myTeamIdx === -1) return (
                <div class="max-w-md mx-auto p-10 pt-40 text-center">
                    <div class="text-6xl animate-bounce mb-8">🚀</div>
                    <p class="font-black uppercase italic text-slate-400 text-xl">Du bist drin!</p>
                    <p class="text-indigo-600 font-bold mt-4 italic">Warte bis der Spielleiter dich am TV einem Team zuweist.</p>
                </div>
            );

            return <div class="p-10 text-center font-black">TEAM GEFUNDEN! Schau auf den Fernseher.</div>;
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
