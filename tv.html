<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet TV - ULTRSTABLE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; overflow: hidden; }
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1); }
        .island-board { position: relative; width: 100%; height: 450px; background: #E0F2FE; border-radius: 3rem; border: 4px solid #BAE6FD; overflow: hidden; }
        .field { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; transform: translate(-50%, -50%); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #94A3B8; z-index: 10; }
        .token { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; position: absolute; z-index: 30; transform: translate(-50%, -50%); transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dice-box { width: 80px; height: 80px; background: white; border: 4px solid black; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; box-shadow: 0 6px 0 #cbd5e1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "PARTY_V3_STABLE"; // Neue ID für saubere Daten

        const COLORS = ['#6366F1', '#3B82F6', '#10B981', '#F59E0B'];
        const GAMES = [
            { n: "Bierdeckel-Flip", r: "Wer flippt am meisten Deckel von der Kante?" },
            { n: "Socken-Zielwurf", r: "Triff den Korb aus 3 Metern Entfernung." },
            { n: "Karten-Haus", r: "Baue das höchste Haus in 60 Sekunden." },
            { n: "Becher-Pong", r: "Triff den Becher des Gegners mit einem Ball." }
        ];

        const BOARD_PATH = Array.from({length: 30}, (_, i) => {
            const angle = (i / 15) * Math.PI;
            const rx = i < 15 ? 40 : 25;
            return { x: 50 + Math.cos(angle * 2) * rx, y: 50 + Math.sin(angle) * 35 };
        });

        function TVArena() {
            const [room, setRoom] = useState(null);
            const [dragged, setDragged] = useState(null);

            useEffect(() => {
                const ref = db.ref(`rooms/${ROOM_ID}`);
                ref.on('value', s => {
                    const data = s.val();
                    if (data && data.teams && !Array.isArray(data.teams)) {
                        data.teams = Object.values(data.teams); // Fix: Objekt zu Array
                    }
                    setRoom(data);
                });
                return () => ref.off();
            }, []);

            const init = () => {
                db.ref(`rooms/${ROOM_ID}`).set({
                    phase: 'setup', round: 1, currentTurn: 0, dice: 1, game: null, waitingRoom: {},
                    teams: [
                        {name: "Team 1", members: [], credits: 100, position: 0, color: COLORS[0]},
                        {name: "Team 2", members: [], credits: 100, position: 0, color: COLORS[1]},
                        {name: "Team 3", members: [], credits: 100, position: 0, color: COLORS[2]},
                        {name: "Team 4", members: [], credits: 100, position: 0, color: COLORS[3]}
                    ]
                });
            };

            const updateDB = (updates) => db.ref(`rooms/${ROOM_ID}`).update(updates);

            const rollDice = () => {
                if (!room?.teams) return;
                const idx = room.currentTurn;
                const roll = Math.floor(Math.random() * 6) + 1;
                const bonus = room.teams[idx]?.activeEffect === 'mushroom' ? 3 : 0;
                const total = roll + bonus;
                
                const newTeams = [...room.teams];
                newTeams[idx].position = Math.min(29, (newTeams[idx].position || 0) + total);
                newTeams[idx].activeEffect = null;

                updateDB({
                    teams: newTeams,
                    dice: total,
                    currentTurn: (idx + 1) % room.teams.length
                });
            };

            if (!room) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-white">
                        <h1 className="text-4xl font-black text-indigo-600 mb-6 italic">PartyBet TV</h1>
                        <button onClick={init} className="bg-indigo-600 text-white px-10 py-5 rounded-3xl font-black shadow-2xl">ARENA STARTEN</button>
                    </div>
                );
            }

            const teams = room.teams || [];
            const waitRoom = room.waitingRoom || {};
            const currentGame = room.game || null;

            return (
                <div className="p-6 max-w-[1400px] mx-auto min-h-screen flex flex-col">
                    <header className="flex justify-between items-center mb-6">
                        <h1 className="text-3xl font-black text-indigo-600 uppercase italic">Live Arena</h1>
                        <div className="flex gap-2">
                            {teams.map((t, i) => (
                                <div key={i} className={`bg-white px-4 py-2 rounded-xl border-t-4 shadow-sm transition-all ${room.currentTurn === i && room.phase === 'movement' ? 'scale-110 ring-4 ring-indigo-500 z-50' : 'opacity-40'}`} style={{borderColor: t.color}}>
                                    <p className="text-[8px] font-black text-slate-400 uppercase">{t.name}</p>
                                    <p className="text-lg font-black">{t.credits} Gems</p>
                                </div>
                            ))}
                            <button onClick={init} className="bg-red-500 text-white px-3 rounded-lg font-black text-[8px] uppercase ml-4">Reset</button>
                        </div>
                    </header>

                    <div className="flex-1 bg-white rounded-[3rem] shadow-2xl p-8 flex flex-col relative border border-white overflow-hidden">
                        
                        {room.phase === 'setup' && (
                            <div className="w-full h-full flex gap-8">
                                <div className="w-1/4 bg-slate-50 rounded-[2.5rem] p-6 border-4 border-dashed border-slate-200">
                                    <h2 className="text-xs font-black uppercase text-slate-400 mb-4 text-center">Warteraum</h2>
                                    {Object.keys(waitRoom).map(n => (
                                        <div key={n} draggable onDragStart={() => setDragged(n)} className="bg-white p-4 rounded-xl shadow mb-2 font-black border-l-4 border-indigo-600 cursor-move text-xs uppercase">👤 {n}</div>
                                    ))}
                                </div>
                                <div className="flex-1 grid grid-cols-2 gap-4">
                                    {teams.map((t, i) => (
                                        <div key={i} onDragOver={e => e.preventDefault()} onDrop={() => {
                                            if(!dragged) return;
                                            const newTs = [...teams];
                                            if(!newTs[i].members) newTs[i].members = [];
                                            if(newTs[i].members.length >= 2) return alert("Voll!");
                                            newTs[i].members.push({name: dragged});
                                            db.ref(`rooms/${ROOM_ID}/waitingRoom/${dragged}`).remove();
                                            updateDB({ teams: newTs });
                                            setDragged(null);
                                        }} className="bg-white border-2 border-slate-100 rounded-[2rem] p-4 flex flex-col items-center justify-center shadow-inner relative">
                                            <span className="absolute top-3 text-[8px] font-black text-slate-300 uppercase">{t.name}</span>
                                            <div className="flex gap-2">
                                                {[0,1].map(m => (
                                                    <div key={m} className="w-16 h-16 rounded-full bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center font-black">
                                                        {t.members?.[m] ? <div className="w-full h-full rounded-full flex items-center justify-center bg-indigo-600 text-white text-2xl border-2 border-white shadow-lg">{t.members[m].name[0]}</div> : "?"}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => updateDB({phase: 'selection'})} className="absolute bottom-6 right-6 bg-indigo-600 text-white px-10 py-4 rounded-full font-black uppercase italic shadow-xl">Start Game</button>
                            </div>
                        )}

                        {room.phase === 'selection' && (
                            <div className="flex flex-col items-center justify-center h-full text-center">
                                <h2 className="text-5xl font-black uppercase italic mb-10">Minispiel</h2>
                                <div className="h-40 flex items-center justify-center">
                                    {currentGame ? (
                                        <div className="bg-indigo-50 p-10 rounded-[3rem] border-4 border-indigo-200 animate-bounce">
                                            <p className="text-5xl font-black text-indigo-600 uppercase italic mb-2">{currentGame.n}</p>
                                            <p className="text-xl font-bold text-indigo-400 italic max-w-lg">{currentGame.r}</p>
                                        </div>
                                    ) : <div className="text-slate-200 text-7xl font-black italic">???</div>}
                                </div>
                                <div className="flex gap-4 mt-10">
                                    <button onClick={() => updateDB({game: GAMES[Math.floor(Math.random()*GAMES.length)]})} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-black shadow-xl uppercase italic">Zufall 🎲</button>
                                    <button onClick={() => updateDB({phase: 'movement'})} className="bg-slate-900 text-white px-8 py-4 rounded-full font-black uppercase text-xs italic tracking-widest">Board ➔</button>
                                </div>
                            </div>
                        )}

                        {room.phase === 'movement' && (
                            <div className="w-full h-full flex flex-col">
                                <div className="island-board flex-1 mb-6 relative shadow-inner">
                                    {BOARD_PATH.map((p, i) => <div key={i} className="field" style={{left: `${p.x}%`, top: `${p.y}%`}}>{i === 0 ? '🏁' : i === 29 ? '🏆' : i}</div>)}
                                    {teams.map((t, i) => (
                                        <div key={i} className="token" style={{left: `${BOARD_PATH[t.position || 0].x}%`, top: `${BOARD_PATH[t.position || 0].y}%`, backgroundColor: t.color}}>
                                            {t.activeEffect === 'mushroom' && <span className="absolute -top-6 -right-6 text-xl">🍄</span>}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center bg-slate-50 p-6 rounded-[2.5rem] border border-white">
                                    <div className="flex items-center gap-4">
                                        <div className="dice-box">{room.dice}</div>
                                        <h3 className="text-2xl font-black uppercase italic" style={{color: teams[room.currentTurn]?.color}}>{teams[room.currentTurn]?.name}</h3>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={rollDice} className="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black text-xl uppercase italic shadow-xl">Würfeln!</button>
                                        <button onClick={() => updateDB({phase:'selection', game:null, round:room.round+1})} className="bg-slate-900 text-white px-6 rounded-2xl font-black text-[10px] uppercase italic">Runde beenden</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TVArena />);
    </script>
</body>
</html>
