<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartyBet TV</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        .island { position: relative; width: 100%; height: 450px; background: #E0F2FE; border-radius: 3rem; border: 4px solid #BAE6FD; overflow: hidden; }
        .fld { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; transform: translate(-50%, -50%); background: #fff; z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #94A3B8; }
        .pawn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid white; position: absolute; z-index: 30; transform: translate(-50%, -50%); transition: all 1s ease-in-out; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">
    <div id="root">
        <div class="h-screen flex items-center justify-center font-black text-slate-300 animate-pulse uppercase">Lade Arena...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const RID = "PARTY_STABLE_V4";

        const GAMES = [
            {n:"Bierdeckel-Flip", r:"Wer flippt am meisten Deckel von der Kante?"},
            {n:"Socken-Wurf", r:"Triff den Korb aus 3m Entfernung."},
            {n:"Karten-Haus", r:"Höchstes Haus in 60 Sek."},
            {n:"Eis-Schmelzer", r:"Schmelze den Würfel nur mit den Händen."}
        ];

        const PATH = Array.from({length:30}, (_,i) => {
            const a = (i/15)*Math.PI; const rx = i<15?40:25;
            return { x: 50 + Math.cos(a*2)*rx, y: 50 + Math.sin(a)*35 };
        });

        function TV() {
            const [room, setRoom] = useState(null);

            useEffect(() => {
                db.ref(`rooms/${RID}`).on('value', s => setRoom(s.val()));
            }, []);

            const init = () => db.ref(`rooms/${RID}`).set({
                phase: 'setup', round: 1, turn: 0, dice: 1, 
                teams: [{name:"Team Blau", color:"#6366F1", pos:0, credits:100}, {name:"Team Rot", color:"#EF4444", pos:0, credits:100}, {name:"Team Grün", color:"#10B981", pos:0, credits:100}, {name:"Team Gelb", color:"#F59E0B", pos:0, credits:100}]
            });

            if (!room) return <div class="h-screen flex flex-col items-center justify-center bg-white p-10"><h1 class="text-4xl font-black text-indigo-600 mb-8 italic uppercase">Arena Bereit</h1><button onClick={init} class="bg-indigo-600 text-white px-10 py-5 rounded-full font-black shadow-2xl">SPIEL STARTEN</button></div>;

            return (
                <div class="p-8 max-w-[1400px] mx-auto min-h-screen flex flex-col font-sans text-slate-800">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-4xl font-black text-indigo-600 italic uppercase">PartyBet Live</h1>
                        <div class="flex gap-4">
                            {room.teams?.map((t, i) => (
                                <div key={i} class={`bg-white p-4 rounded-2xl shadow-sm border-t-8 transition-all ${room.turn === i && room.phase === 'move' ? 'ring-4 ring-indigo-400 scale-110' : 'opacity-40'}`} style={{borderColor: t.color}}>
                                    <p class="text-[10px] font-black uppercase text-slate-400">{t.name}</p>
                                    <p class="text-xl font-black">{t.credits} CR</p>
                                </div>
                            ))}
                            <button onClick={init} class="bg-red-500 text-white px-3 rounded-xl font-black text-[8px] uppercase h-8 mt-auto">Reset</button>
                        </div>
                    </div>

                    <div class="flex-1 bg-white rounded-[3rem] shadow-2xl p-10 relative flex flex-col items-center justify-center border border-white overflow-hidden">
                        {room.phase === 'setup' && (
                            <div class="grid grid-cols-12 gap-8 w-full h-full">
                                <div class="col-span-4 bg-slate-50 rounded-[2.5rem] p-6 border-4 border-dashed border-slate-200">
                                    <h2 class="text-xl font-black uppercase text-slate-400 mb-6 italic text-center tracking-widest">Handys</h2>
                                    {room.waitingRoom ? Object.keys(room.waitingRoom).map(n => (
                                        <div key={n} class="bg-white p-4 rounded-xl shadow-md font-black border-l-8 border-indigo-600 mb-3 uppercase text-xs flex justify-between items-center">
                                            👤 {n} 
                                            <div class="flex gap-1">
                                                {[0,1,2,3].map(i => <button key={i} onClick={() => {
                                                    const ts = [...room.teams]; if(!ts[i].members) ts[i].members = [];
                                                    ts[i].members.push({name:n});
                                                    db.ref(`rooms/${RID}/waitingRoom/${n}`).remove();
                                                    db.ref(`rooms/${RID}/teams`).set(ts);
                                                }} class="bg-indigo-600 text-white w-6 h-6 rounded font-bold text-[10px]">{i+1}</button>)}
                                            </div>
                                        </div>
                                    )) : <p class="text-center text-slate-300 italic py-10 uppercase text-[10px] font-black">Warte auf Namen...</p>}
                                </div>
                                <div class="col-span-8 grid grid-cols-2 gap-4">
                                    {room.teams.map((t, i) => (
                                        <div key={i} class="bg-white border-2 border-slate-100 rounded-[2.5rem] flex flex-col items-center justify-center p-6 shadow-inner">
                                            <p class="text-[10px] font-black text-slate-300 uppercase mb-4">{t.name}</p>
                                            <div class="flex gap-4">
                                                {[0,1].map(m => <div key={m} class="w-20 h-20 rounded-full bg-slate-50 border-4 border-dashed border-slate-100 flex items-center justify-center font-black">
                                                    {t.members?.[m] ? <div class="w-full h-full rounded-full flex items-center justify-center bg-indigo-600 text-white text-3xl shadow-lg border-4 border-white">{t.members[m].name[0]}</div> : "?"}
                                                </div>)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => db.ref(`rooms/${RID}/phase`).set('spin')} class="absolute bottom-10 right-10 bg-indigo-600 text-white px-12 py-5 rounded-full font-black shadow-2xl text-xl uppercase italic">Spielen!</button>
                            </div>
                        )}

                        {room.phase === 'spin' && (
                            <div class="text-center">
                                <h2 class="text-6xl font-black uppercase italic mb-10 tracking-tighter">Minispiel</h2>
                                <div class="h-44 flex items-center justify-center mb-10">
                                    {room.game ? <div class="bg-indigo-50 p-10 rounded-[3rem] border-8 border-white shadow-2xl animate-bounce"><p class="text-6xl font-black text-indigo-600 uppercase italic mb-2">{room.game.n}</p><p class="text-xl font-bold text-indigo-400 italic">{room.game.r}</p></div> : <div class="text-slate-200 text-8xl font-black italic">???</div>}
                                </div>
                                <button onClick={() => db.ref(`rooms/${RID}/game`).set(GAMES[Math.floor(Math.random()*GAMES.length)])} class="bg-indigo-600 text-white px-10 py-5 rounded-full font-black shadow-xl uppercase italic">Roulette 🎲</button>
                                <button onClick={() => db.ref(`rooms/${RID}/phase`).set('move')} class="block mt-8 mx-auto text-xs font-black text-slate-400 uppercase underline">Board ➔</button>
                            </div>
                        )}

                        {room.phase === 'move' && (
                            <div class="w-full h-full flex flex-col">
                                <div class="island flex-1 mb-8 shadow-inner relative">
                                    {PATH.map((p, i) => <div key={i} class="fld" style={{left:`${p.x}%`, top:`${p.y}%`}}>{i === 0 ? '🏁' : i === 29 ? '🏆' : i}</div>)}
                                    {room.teams.map((t, i) => <div key={i} class="pawn" style={{left:`${PATH[t.pos || 0].x}%`, top:`${PATH[t.pos || 0].y}%`, backgroundColor:t.color}}>
                                        {t.activeEffect === 'mushroom' && <span class="absolute -top-6 -right-6 text-2xl">🍄</span>}
                                    </div>)}
                                </div>
                                <div class="flex justify-between items-center bg-slate-50 p-8 rounded-[3rem] border border-white">
                                    <div class="flex items-center gap-6">
                                        <div class="w-20 h-20 bg-white border-4 border-black rounded-3xl flex items-center justify-center text-4xl font-black shadow-lg">{room.dice}</div>
                                        <h3 class="text-3xl font-black uppercase italic" style={{color: room.teams[room.turn].color}}>{room.teams[room.turn].name} ist dran!</h3>
                                    </div>
                                    <button onClick={() => {
                                        const roll = Math.floor(Math.random()*6)+1;
                                        const bonus = room.teams[room.turn].activeEffect === 'mushroom' ? 3 : 0;
                                        const total = roll + bonus;
                                        const ts = [...room.teams]; ts[room.turn].pos = Math.min(29, (ts[room.turn].pos || 0) + total); ts[room.turn].activeEffect = null;
                                        db.ref(`rooms/${RID}`).update({ teams: ts, dice: total, turn: (room.turn + 1) % room.teams.length });
                                    }} class="bg-indigo-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl uppercase italic">Würfeln!</button>
                                    <button onClick={() => db.ref(`rooms/${RID}`).update({phase:'spin', game:null, round:room.round+1})} class="text-slate-400 font-bold uppercase text-[10px] underline">Nächste Runde</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TV />);
    </script>
</body>
</html>
