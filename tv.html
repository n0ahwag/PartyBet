<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Arena - PartyBet</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyA95lwHyq0cZ5z7si_woAn8iKFeFqtoDv8",
            authDomain: "partybe-d44b7.firebaseapp.com",
            databaseURL: "https://partybe-d44b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "partybe-d44b7",
            storageBucket: "partybe-d44b7.firebasestorage.app",
            messagingSenderId: "960737105971",
            appId: "1:960737105971:web:55482d6ea806bca6a36b46"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_ID = "PARTY_SYNC_FINAL";

        const COLORS = ['#6366F1', '#3B82F6', '#10B981', '#F59E0B'];

        function TVApp() {
            const [room, setRoom] = useState(null);

            useEffect(() => {
                db.ref(`rooms/${ROOM_ID}`).on('value', s => setRoom(s.val()));
            }, []);

            const initArena = () => {
                db.ref(`rooms/${ROOM_ID}`).update({
                    phase: 'setup',
                    round: 1,
                    teams: [
                        {name: "Team Blau", members: [], credits: 100, position: 0, color: COLORS[0]},
                        {name: "Team Cyan", members: [], credits: 100, position: 0, color: COLORS[1]},
                        {name: "Team Grün", members: [], credits: 100, position: 0, color: COLORS[2]},
                        {name: "Team Gelb", members: [], credits: 100, position: 0, color: COLORS[3]}
                    ]
                });
            };

            const assignPlayer = (name, teamIdx) => {
                const teams = [...room.teams];
                if (!teams[teamIdx].members) teams[teamIdx].members = [];
                if (teams[teamIdx].members.length >= 2) return alert("Team voll!");
                
                teams[teamIdx].members.push({ name });
                // Aus Warteraum entfernen und Team in DB aktualisieren
                db.ref(`rooms/${ROOM_ID}/waitingRoom/${name}`).remove();
                db.ref(`rooms/${ROOM_ID}/teams`).set(teams);
            };

            if (!room) return <div className="h-screen flex items-center justify-center"><button onClick={initArena} className="bg-indigo-600 text-white p-10 rounded-full font-black">ARENA INITIALISIEREN</button></div>;

            return (
                <div className="p-10 max-w-[1400px] mx-auto min-h-screen">
                    <h1 className="text-5xl font-black text-indigo-600 italic mb-10 uppercase tracking-tighter">PartyBet TV</h1>
                    
                    {room.phase === 'setup' && (
                        <div className="grid grid-cols-12 gap-10">
                            {/* Warteraum Liste */}
                            <div className="col-span-4 bg-white rounded-[3rem] p-8 card-shadow border-4 border-dashed border-indigo-100">
                                <h2 className="text-xl font-black uppercase text-slate-400 mb-6 text-center italic tracking-widest">Warteraum</h2>
                                <div className="space-y-3">
                                    {room.waitingRoom ? Object.keys(room.waitingRoom).map(name => (
                                        <div key={name} className="bg-slate-50 p-5 rounded-2xl font-black border-l-8 border-indigo-600 flex justify-between items-center shadow-sm">
                                            <span class="uppercase text-sm">👤 {name}</span>
                                            <div class="flex gap-1">
                                                {[0,1,2,3].map(i => (
                                                    <button key={i} onClick={() => assignPlayer(name, i)} className="bg-indigo-600 text-white w-6 h-6 rounded-md text-[10px]">{i+1}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )) : <p className="text-center text-slate-300 italic py-10">Keine Spieler online...</p>}
                                </div>
                            </div>

                            {/* Team Übersicht */}
                            <div className="col-span-8 grid grid-cols-2 gap-6">
                                {room.teams.map((t, i) => (
                                    <div key={i} className="bg-white rounded-[3rem] p-8 card-shadow flex flex-col items-center justify-center relative">
                                        <p class="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-widest">{t.name}</p>
                                        <div className="flex gap-4">
                                            {[0,1].map(m => (
                                                <div key={m} className="w-24 h-24 rounded-full bg-slate-50 border-4 border-dashed border-slate-100 flex items-center justify-center font-black overflow-hidden">
                                                    {t.members?.[m] ? <div class="w-full h-full flex items-center justify-center bg-indigo-600 text-white text-4xl uppercase">{t.members[m].name[0]}</div> : "?"}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {room.phase !== 'setup' && <div class="text-center py-20 text-4xl font-black italic">Spiel läuft... (Phase: {room.phase})</div>}
                    <button onClick={initArena} class="fixed bottom-4 right-4 bg-red-100 text-red-500 px-4 py-2 rounded-xl font-bold text-xs uppercase">Kompletter Reset</button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TVApp />);
    </script>
</body>
</html>
